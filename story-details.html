<body class="text-gray-800">

    <nav class="bg-[#4a2c10] text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter">
                Bangla <span class="text-amber-400">Choti</span> Golpo
            </a>
            <a href="index.html" class="text-sm bg-amber-500 px-4 py-2 rounded-full font-bold">সব গল্প</a>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 max-w-4xl">
        <div id="story-container" class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100">
            <div class="animate-pulse">
                <div class="h-8 bg-gray-200 rounded w-3/4 mb-6"></div>
                <div class="h-4 bg-gray-200 rounded w-full mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-full mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
            </div>
        </div>

        <div class="mt-12">
            <h3 class="text-xl font-bold mb-6 border-l-4 border-amber-500 pl-3">আরও পড়ুন</h3>
            <div id="bottom-suggestions" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        function seededShuffle(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.abs(Math.sin(seed++) * m--));
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function loadStoryDetails() {
            const params = new URLSearchParams(window.location.search);
            const storyId = parseInt(params.get('id'));
            const container = document.getElementById('story-container');
            const bottomGrid = document.getElementById('bottom-suggestions');
            
            // Adsterra 320x50 Banner Code
            const adCode = `
                <div class="flex justify-center my-8">
                    <script type="text/javascript">
                        atOptions = { 'key' : '5e1e647770544994278e05a287ff9727', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                    <\/script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/5e1e647770544994278e05a287ff9727/invoke.js"><\/script>
                </div>`;

            try {
                const response = await fetch('stories.json?v=' + new Date().getHours());
                const allStories = await response.json();
                const story = allStories[storyId];
                
                if (!story) {
                    container.innerHTML = `<h2 class="text-red-500 text-center">গল্পটি পাওয়া যায়নি!</h2>`;
                    return;
                }

                // টাইটেল আপডেট (SEO এর জন্য)
                document.title = story.title + " - Bangla Choti Golpo";

                const paragraphs = story.content.split('\n').filter(p => p.trim() !== '');
                const midPoint = Math.ceil(paragraphs.length / 2);
                
                let suggestions = allStories.map((s, i) => ({ ...s, originalIndex: i })).filter((_, i) => i !== storyId);
                suggestions = seededShuffle(suggestions, new Date().getHours());

                let storyHTML = `<h1 class="text-3xl md:text-4xl font-bold mb-6 text-gray-900 leading-tight">${story.title}</h1>`;
                storyHTML += `<div class="content-area">`;
                
                // প্রথম অংশ
                paragraphs.slice(0, midPoint).forEach(p => storyHTML += `<p>${p}</p>`);
                
                // মাঝখানে অ্যাড
                storyHTML += adCode; 

                // ইন-পোস্ট সাজেশন
                const midSug = suggestions[0];
                if (midSug) {
                    storyHTML += `
                        <div class="my-8 p-6 bg-amber-50 rounded-2xl border-l-4 border-amber-400">
                            <span class="text-xs font-bold text-amber-700 uppercase">এটিও পড়ুন:</span>
                            <h4 class="text-lg font-bold mt-1 text-gray-800">${midSug.title}</h4>
                            <a href="story-details.html?id=${midSug.originalIndex}" class="inline-block mt-2 text-[#4a2c10] font-bold border-b-2 border-[#4a2c10]">পড়ুন <i class="fas fa-arrow-right ml-1"></i></a>
                        </div>`;
                }

                // দ্বিতীয় অংশ
                paragraphs.slice(midPoint).forEach(p => storyHTML += `<p>${p}</p>`);
                
                // শেষে অ্যাড
                storyHTML += adCode; 
                storyHTML += `</div>`;
                
                container.innerHTML = storyHTML;

                // নিচের সাজেশনগুলো
                suggestions.slice(1, 5).forEach(s => {
                    bottomGrid.innerHTML += `
                        <a href="story-details.html?id=${s.originalIndex}" class="bg-white p-5 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm hover:bg-amber-50 transition">
                            <span class="font-bold text-gray-800 line-clamp-1">${s.title}</span>
                            <i class="fas fa-chevron-right text-amber-400 text-xs ml-2"></i>
                        </a>`;
                });

            } catch (e) { 
                console.error(e);
                container.innerHTML = `<p class="text-center text-red-500 font-bold">সার্ভার থেকে ডেটা লোড করতে সমস্যা হয়েছে।</p>`;
            }
        }
        window.addEventListener('load', loadStoryDetails);
    </script>

    <script type="text/javascript" src="https://pl29118390.profitablecpmratenetwork.com/e2/69/59/e2695923dcff4d72dfb47330a2df3bc4.js"></script>
