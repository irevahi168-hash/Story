<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গল্পের বিস্তারিত - গল্পের আসর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Anek Bangla', sans-serif; background-color: #fcf8f3; }
        .content-area { 
            line-height: 2; 
            font-size: 1.2rem; 
            color: #2d3436; 
            white-space: pre-line; /* প্যারাগ্রাফ ঠিক রাখার জন্য */
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-[#603813] text-white p-4 shadow-md">
        <div class="container mx-auto flex items-center gap-4">
            <a href="index.html" class="hover:text-amber-400 transition">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-bold">গল্পের আসর</h1>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 max-w-3xl">
        <div id="story-wrapper" class="bg-white p-6 md:p-12 rounded-2xl shadow-lg border border-gray-100">
            <div id="loader" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-4 border-amber-700 mb-4"></div>
                <p class="text-gray-500 italic">গল্পটি সাজানো হচ্ছে...</p>
            </div>
            
            <div id="story-content" class="hidden">
                <div class="mb-8 border-b border-gray-100 pb-6">
                    <span id="story-source" class="text-amber-700 font-bold uppercase tracking-widest text-xs"></span>
                    <h1 id="story-title" class="text-3xl md:text-4xl font-bold text-gray-900 mt-2 mb-4 leading-tight"></h1>
                    <div class="text-gray-500 text-sm italic">
                        <i class="fa-solid fa-feather-pointed mr-2"></i> লেখক: <span id="story-author"></span>
                    </div>
                </div>
                
                <div id="full-text" class="content-area"></div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <a href="index.html" class="bg-[#603813] text-white px-10 py-3 rounded-full font-bold hover:bg-amber-800 transition shadow-lg inline-block">
                আরও গল্প পড়ুন
            </a>
        </div>
    </main>

    <script>
        async function loadStory() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            const loader = document.getElementById('loader');
            const storyContent = document.getElementById('story-content');

            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // v=2.0 ব্যবহার করা হয়েছে যেন বারবার ক্যাশ রিফ্রেশ না করে
                const response = await fetch('stories.json?v=2.0');
                if (!response.ok) throw new Error("File not found");
                
                const stories = await response.json();
                const story = stories[parseInt(id)];

                if (story) {
                    // ডেটা বসানো হচ্ছে
                    document.getElementById('story-title').innerText = story.title;
                    document.getElementById('story-author').innerText = story.author || 'সংগৃহীত';
                    document.getElementById('story-source').innerText = story.source || 'গল্প';
                    document.getElementById('full-text').innerText = story.content;
                    
                    // লোডার সরিয়ে কন্টেন্ট দেখানো
                    loader.style.display = 'none';
                    storyContent.classList.remove('hidden');
                    document.title = story.title + " - গল্পের আসর";
                } else {
                    loader.innerHTML = "<p class='text-red-500 font-bold'>দুঃখিত, গল্পটি পাওয়া যায়নি!</p>";
                }
            } catch (err) {
                console.error(err);
                loader.innerHTML = "<p class='text-red-500'>গল্প লোড করতে সমস্যা হয়েছে। দয়া করে একটু পর চেষ্টা করুন।</p>";
            }
        }

        // DOMContentLoaded ব্যবহার করা হয়েছে যেন পেজ রেন্ডার হয়ে গেলেই কল হয়
        document.addEventListener('DOMContentLoaded', loadStory);
    </script>
</body>
</html>
