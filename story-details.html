<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গল্পের বিস্তারিত - গল্পের আসর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Anek Bangla', sans-serif; background-color: #f9f5f0; }
        .content-area p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.1rem; color: #374151; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-[#4a2c10] text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold">গল্পের <span class="text-amber-400">আসর</span></a>
            <a href="index.html" class="text-sm bg-amber-500 px-4 py-2 rounded-full">সব গল্প</a>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 max-w-4xl">
        <div id="story-container" class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-gray-100"></div>
        <div class="mt-12">
            <h3 class="text-xl font-bold mb-6 border-l-4 border-amber-500 pl-3">আরও পড়ুন</h3>
            <div id="bottom-suggestions" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        function seededShuffle(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.abs(Math.sin(seed++) * m--));
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function loadStoryDetails() {
            const params = new URLSearchParams(window.location.search);
            const storyId = parseInt(params.get('id'));
            const container = document.getElementById('story-container');
            const bottomGrid = document.getElementById('bottom-suggestions');
            const adCode = `
                <div class="flex justify-center my-8">
                    <script type="text/javascript">
                        atOptions = { 'key' : '5e1e647770544994278e05a287ff9727', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                    <\/script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/5e1e647770544994278e05a287ff9727/invoke.js"><\/script>
                </div>`;

            try {
                const response = await fetch('stories.json?v=' + new Date().getHours());
                const allStories = await response.json();
                const story = allStories[storyId];
                
                const paragraphs = story.content.split('\n').filter(p => p.trim() !== '');
                const midPoint = Math.ceil(paragraphs.length / 2);
                
                let suggestions = allStories.map((s, i) => ({ ...s, originalIndex: i })).filter((_, i) => i !== storyId);
                suggestions = seededShuffle(suggestions, new Date().getHours());

                let storyHTML = `<h1 class="text-3xl font-bold mb-6">${story.title}</h1><div class="content-area">`;
                
                paragraphs.slice(0, midPoint).forEach(p => storyHTML += `<p>${p}</p>`);
                storyHTML += adCode; // মাঝখানে অ্যাড

                const midSug = suggestions[0];
                if (midSug) {
                    storyHTML += `<div class="my-8 p-6 bg-amber-50 rounded-xl border-l-4 border-amber-400">
                        <span class="text-xs font-bold text-amber-700">আরো একটি গল্প:</span>
                        <h4 class="text-lg font-bold">${midSug.title}</h4>
                        <a href="story-details.html?id=${midSug.originalIndex}" class="text-sm font-bold underline">পড়ুন</a>
                    </div>`;
                }

                paragraphs.slice(midPoint).forEach(p => storyHTML += `<p>${p}</p>`);
                storyHTML += adCode; // শেষে অ্যাড
                storyHTML += `</div>`;
                container.innerHTML = storyHTML;

                suggestions.slice(1, 5).forEach(s => {
                    bottomGrid.innerHTML += `
                        <a href="story-details.html?id=${s.originalIndex}" class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                            <span class="font-bold text-sm">${s.title}</span>
                            <i class="fas fa-chevron-right text-amber-400 text-xs"></i>
                        </a>`;
                });
            } catch (e) { container.innerHTML = "Error!"; }
        }
        window.addEventListener('load', loadStoryDetails);
    </script>

    <script type="text/javascript" src="https://pl29118390.profitablecpmratenetwork.com/e2/69/59/e2695923dcff4d72dfb47330a2df3bc4.js"></script>
</body>
</html>
