<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গল্পের বিস্তারিত - গল্পের আসর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Anek Bangla', sans-serif; background-color: #fcf8f3; }
        .content-area { line-height: 1.8; font-size: 1.15rem; color: #333; }
        .story-container { background: white; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-[#603813] text-white p-4 shadow-md">
        <div class="container mx-auto">
            <a href="index.html" class="text-xl font-bold"><i class="fa-solid fa-arrow-left mr-2"></i> গল্পের <span class="text-amber-400">আসর</span></a>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 max-w-3xl">
        <div id="story-full-content" class="story-container p-6 md:p-12 rounded-xl">
            <div id="loader" class="text-center py-20">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-600"></i>
                <p class="mt-4">গল্পটি সাজানো হচ্ছে...</p>
            </div>
        </div>

        <div class="mt-10 text-center">
            <a href="index.html" class="bg-[#603813] text-white px-8 py-3 rounded-full font-bold hover:bg-amber-800 transition shadow-lg">
                আরও গল্প পড়ুন
            </a>
        </div>
    </main>

    <script>
        async function loadStoryDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');
            const contentDiv = document.getElementById('story-full-content');

            if (storyId === null) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch('stories.json?v=' + Date.now());
                const stories = await response.json();
                const story = stories[storyId];

                if (!story) {
                    contentDiv.innerHTML = "<h2 class='text-center text-red-600 text-2xl font-bold py-20'>দুঃখিত! গল্পটি খুঁজে পাওয়া যায়নি।</h2>";
                    return;
                }

                // UI Update
                document.title = story.title + " - গল্পের আসর";
                contentDiv.innerHTML = `
                    <div class="mb-8 border-b pb-6">
                        <span class="text-amber-700 font-bold uppercase tracking-widest text-xs">${story.source || 'Bangla Story'}</span>
                        <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mt-2 mb-4 leading-tight">${story.title}</h1>
                        <div class="flex items-center text-gray-500 text-sm italic">
                            <i class="fa-solid fa-pen-nib mr-2"></i> লেখক: ${story.author || 'অজ্ঞাত'}
                        </div>
                    </div>
                    
                    <div class="content-area whitespace-pre-line">
                        ${story.content}
                    </div>

                    <div class="mt-12 pt-6 border-t flex justify-between items-center text-gray-400 text-sm">
                        <span>সংগৃহীত গল্প</span>
                        <div class="flex gap-4">
                            <i class="fab fa-facebook hover:text-blue-600 cursor-pointer text-xl"></i>
                            <i class="fab fa-whatsapp hover:text-green-600 cursor-pointer text-xl"></i>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Error:", error);
                contentDiv.innerHTML = "<p class='text-red-500 text-center'>গল্প লোড করতে সমস্যা হয়েছে।</p>";
            }
        }

        window.onload = loadStoryDetail;
    </script>
</body>
</html>
