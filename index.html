<body class="text-gray-800">

    <header class="bg-[#603813] py-16 px-4 text-center text-white">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">হারিয়ে যান গল্পের মায়াজালে</h1>

    </header>

    <main class="container mx-auto py-12 px-4 min-h-screen">
        <div id="story-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-white p-6 rounded-lg h-64 border border-gray-200"></div>
        </div>
    </main>

    <footer class="bg-[#1a1108] text-gray-400 py-12 px-4 text-center border-t border-amber-900/20">
        <h4 class="text-white font-bold mb-2">Bangla Choti Golpo</h4>
        <p class="text-xs italic text-gray-600">Developed with ❤️ by Kabir</p>
    </footer>

    <script>
        let allStories = [];

        function seededShuffle(array, seed) {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.abs(Math.sin(seed++) * m--));
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        }

        async function fetchStories() {
            const grid = document.getElementById('story-grid');
            try {
                const response = await fetch('stories.json?v=' + new Date().getHours());
                allStories = await response.json();
                const now = new Date();
                const currentSeed = parseInt(now.getFullYear().toString() + (now.getMonth() + 1) + now.getDate() + now.getHours());
                renderStories(currentSeed);
            } catch (error) {
                grid.innerHTML = `<p class="text-center text-red-500">Error loading stories.</p>`;
            }
        }

        function renderStories(seed) {
            const grid = document.getElementById('story-grid');
            const displayStories = seededShuffle([...allStories], seed);
            grid.innerHTML = ''; 

            const adCode = `
                <div class="col-span-full flex justify-center my-4">
                    <script type="text/javascript">
                        atOptions = { 'key' : '5e1e647770544994278e05a287ff9727', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                    <\/script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/5e1e647770544994278e05a287ff9727/invoke.js"><\/script>
                </div>`;

            grid.innerHTML += adCode; 

            displayStories.forEach((story, index) => {
                const originalIndex = allStories.findIndex(s => s.title === story.title);
                const previewText = story.content.substring(0, 150).replace(/<[^>]*>?/gm, '');

                grid.innerHTML += `
                    <article class="story-card bg-white p-7 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                        <div>
                            <h2 class="text-xl font-bold mb-4 text-gray-900 hover:text-[#603813] transition cursor-pointer">
                                <a href="story-details.html?id=${originalIndex}">${story.title}</a>
                            </h2>
                            <p class="text-gray-600 text-sm line-clamp-3 mb-6">${previewText}...</p>
                        </div>
                        <div class="flex items-center justify-between pt-5 border-t">
                            <span class="text-xs text-gray-400">${story.author || 'সংগৃহীত'}</span>
                            <a href="story-details.html?id=${originalIndex}" class="text-[#603813] font-bold text-sm hover:underline">আরও পড়ুন</a>
                        </div>
                    </article>`;
                
                if ((index + 1) % 6 === 0) grid.innerHTML += adCode;
            });
        }
        window.addEventListener('load', fetchStories);
    </script>
