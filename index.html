<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bangla CHOTI golpo Panu golpo - বাংলা চটি গল্প পানু গল্প</title>
    <meta name="description" content="সেরা সব সংগৃহীত বাংলা চটি গল্পের বিশাল ডিজিটাল সংকলন। প্রতিদিন নতুন নতুন চটি গল্প পড়ুন।">
    <meta name="keywords" content="bangla choti, choti golpo, bangla choti story, চটি গল্প, বাংলা চটি, bangla panu, পানু গল্প">
    
    <meta name="robots" content="index, follow">
    <meta name="rating" content="adult">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Anek Bangla', sans-serif; background-color: #f9f5f0; }
        .story-card { transition: all 0.3s ease; }
        .story-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-[#4a2c10] text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl md:text-2xl font-bold">
                Bangla <span class="text-amber-400">Choti</span> Panu
            </a>
            <div class="flex gap-4 text-sm font-semibold">
                <a href="index.html" class="text-amber-400">হোম</a>
                <a href="#" class="hover:text-amber-400 transition">ক্যাটাগরি</a>
            </div>
        </div>
    </nav>

    <header class="bg-[#603813] py-12 px-4 text-center text-white">
        <h1 class="text-3xl md:text-5xl font-bold mb-4">বাংলা চটি গল্প পানু গল্প</h1>
        <p class="text-amber-100 max-w-2xl mx-auto opacity-80">সেরা সব সংগৃহীত চটি গল্পের এক বিশাল ডিজিটাল সংকলন।</p>
    </header>

    <main class="container mx-auto py-12 px-4 min-h-screen">
        <div id="story-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="bg-[#1a1108] text-gray-400 py-10 px-4 text-center">
        <h4 class="text-white font-bold mb-2">Bangla Choti Golpo</h4>
        <p class="text-xs italic">Developed with ❤️ by Kabir</p>
    </footer>

    <script>
        // এখানে সরাসরি গল্পগুলো বসান (JSON ফাইলের প্রয়োজন নেই)
        const allStories = [
            {
                title: "অফিসের সেই দুপুর",
                content: "গল্পের বিস্তারিত অংশ এখানে লিখুন...",
                author: "সংগৃহীত"
            },
            {
                title: "পাশের বাড়ির ভাবী",
                content: "এখানে আপনার গল্পের দ্বিতীয় অংশ লিখুন...",
                author: "অজানা"
            },
            // নতুন গল্প যোগ করতে চাইলে ওপরের মতো করে এখানে পেস্ট করুন
        ];

        function renderStories() {
            const grid = document.getElementById('story-grid');
            grid.innerHTML = ''; 

            // অ্যাড কোড (ঐচ্ছিক)
            const adCode = `<div class="col-span-full flex justify-center my-4">
                <p class="text-gray-400 text-xs">Advertisement</p>
            </div>`;

            allStories.forEach((story, index) => {
                const previewText = story.content.substring(0, 150);
                
                const card = `
                    <article class="story-card bg-white p-6 rounded-2xl border border-gray-100 flex flex-col justify-between">
                        <div>
                            <h2 class="text-xl font-bold mb-3 text-gray-900">
                                <a href="story-details.html?id=${index}" class="hover:text-[#603813]">${story.title}</a>
                            </h2>
                            <p class="text-gray-600 text-sm line-clamp-3 mb-6">${previewText}...</p>
                        </div>
                        <div class="flex items-center justify-between pt-4 border-t">
                            <span class="text-xs text-gray-400">${story.author}</span>
                            <a href="story-details.html?id=${index}" class="text-[#603813] font-bold text-sm hover:underline">আরও পড়ুন</a>
                        </div>
                    </article>`;
                
                grid.innerHTML += card;

                // প্রতি ৩টি গল্পের পর একটি অ্যাড দেখাবে
                if ((index + 1) % 3 === 0) {
                    grid.innerHTML += adCode;
                }
            });
        }

        // পেজ লোড হলে ফাংশনটি চলবে
        window.addEventListener('load', renderStories);
    </script>
</body>
</html>
