name: Hourly Story Scraper

on:
  schedule:
    - cron: '0 */1 * * *' # Every 1 hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add stories.json
          git commit -m "Auto Update: New unique stories added" || exit 0
          git push
      # ৬. অটোমেটিক সাইটম্যাপ তৈরি করা
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://yourusername.github.io/your-repo/ # এখানে আপনার সাইটের লিঙ্ক দিন
          include-html: true
          include-pdf: false

      # ৭. সাইটম্যাপসহ সব ফাইল পুশ করা
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add stories.json sitemap.xml
          git commit -m "Auto Update: Stories and Sitemap" || exit 0
          git push
          
