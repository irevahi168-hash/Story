name: Hourly Story Scraper

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় রান হবে
  workflow_dispatch: # আপনি চাইলে ম্যানুয়ালি রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py  # আপনার পাইথন ফাইলটির নাম scraper.py হলে এটি ঠিক আছে

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add stories.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update stories.json" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
