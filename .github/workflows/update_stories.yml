name: Auto Update Stories

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম main না হয়ে master হলে সেটা লিখুন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # পুশ করার পারমিশন

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run Automator
      run: python automator.py

    - name: Commit and Push changes
    # এটি চেক করবে যদি কোনো পরিবর্তন হয় তবেই পুশ করবে
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update story layout" && git push)
        
